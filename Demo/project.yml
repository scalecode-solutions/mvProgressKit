name: mvProgressKitDemo
options:
  bundleIdPrefix: app.mvchat.mvprogresskit
  deploymentTarget:
    iOS: "17.0"
packages:
  mvProgressKit:
    path: ".."
targets:
  mvProgressKitDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: mvProgressKit
        product: mvProgressKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.mvchat.mvprogresskit.demo
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
